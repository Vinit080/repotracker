name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build executable
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepoTracker-${{ matrix.os }}
          path: dist/RepoTracker*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp dist-artifacts/RepoTracker-ubuntu-latest/RepoTracker-linux release-assets/ || true
          cp dist-artifacts/RepoTracker-macos-latest/RepoTracker-macos release-assets/ || true
          cp dist-artifacts/RepoTracker-windows-latest/RepoTracker-win.exe release-assets/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
